spring:
  application:
    name: fillinus-erp

  # ──────────────────────────────────────────
  # DATABASE — reads from env var
  # Render injects DATABASE_URL as postgres://user:pass@host/db
  # Railway injects as postgresql://user:pass@host/db
  # We configure Spring to parse both formats
  # ──────────────────────────────────────────
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/fillinus_erp}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway manages schema — DO NOT use create/update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ──────────────────────────────────────────
  # FLYWAY — auto-run migration scripts on startup
  # ──────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ──────────────────────────────────────────
  # MAIL — configure via env vars (Mailtrap / Gmail / etc.)
  # ──────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.mailtrap.io}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ──────────────────────────────────────────
# SERVER — Railway injects PORT env var
# ──────────────────────────────────────────
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

# ──────────────────────────────────────────
# APP CUSTOM CONFIG
# ──────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:fillinus-erp-super-secret-key-change-this-in-production-min-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}       # 24 hours
    refresh-expiration-ms: ${JWT_REFRESH_MS:604800000} # 7 days

  # Base URL used in reset-password email links
  base-url: ${APP_BASE_URL:http://localhost:8080}

  # Password reset token validity
  password-reset-token-expiry-minutes: ${RESET_TOKEN_EXPIRY_MINUTES:30}

# ──────────────────────────────────────────
# SPRINGDOC — Swagger UI
# ──────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# ──────────────────────────────────────────
# ACTUATOR — Health check for Render
# ──────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false   # Don't check SMTP — credentials not required for health
